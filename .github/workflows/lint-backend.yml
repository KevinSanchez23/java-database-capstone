name: Lint Java Backend

on:
  push:
  pull_request:

jobs:
  lint-java:
    name: Checkstyle Java Linting
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download Checkstyle
        run: >-
          curl --fail --location
          --output checkstyle.jar
          https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.1/checkstyle-10.12.1-all.jar

      - name: Run Checkstyle
        run: >-
          java -jar checkstyle.jar
          -c /google_checks.xml
          app/src/main/java/com/project/back_end
          || true
