<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic | Select Your Role</title>

    <link rel="icon" type="image/png" href="./assets/images/logo/logo.png">
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <h2>Select Your Role</h2>

                <div class="role-selection" aria-label="Clinic user roles">
                    <button
                        type="button"
                        id="adminLogin"
                        onclick="selectRole('admin')"
                    >
                        Admin
                    </button>

                    <button
                        type="button"
                        id="doctorLogin"
                        onclick="selectRole('doctor')"
                    >
                        Doctor
                    </button>

                    <button
                        type="button"
                        id="patientLogin"
                        onclick="selectRole('patient')"
                    >
                        Patient
                    </button>
                </div>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div
        id="modal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        aria-label="Login dialog"
    >
        <div class="modal-content">
            <button type="button" id="closeModal" class="close" aria-label="Close modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="./js/services/index.js" defer></script>
</body>
</html>
