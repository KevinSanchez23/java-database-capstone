<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoctorDashboard</title>

    <link rel="icon" type="image/png" href="../../static/assets/images/logo/logo.png"
          th:href="@{/assets/images/logo/logo.png}">
    <link rel="stylesheet" href="../../static/assets/css/adminDashboard.css"
          th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" href="../../static/assets/css/doctorDashboard.css"
          th:href="@{/assets/css/doctorDashboard.css}">
    <link rel="stylesheet" href="../../static/assets/css/style.css"
          th:href="@{/assets/css/style.css}">

    <script src="../../static/js/render.js" th:src="@{/js/render.js}" defer></script>
    <script src="../../static/js/util.js" th:src="@{/js/util.js}" defer></script>
    <script src="../../static/js/components/header.js"
            th:src="@{/js/components/header.js}" defer></script>
    <script src="../../static/js/components/footer.js"
            th:src="@{/js/components/footer.js}" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <h2 class="table-header">Patient Appointments</h2>

                <input
                    type="text"
                    id="searchBar"
                    class="searchBar"
                    placeholder="Search by patient name"
                    aria-label="Search by patient name"
                    autocomplete="off"
                >

                <div class="appointment-filters" aria-label="Appointment date filters">
                    <button type="button" id="todayButton" class="today-btn">
                        Today's Appointments
                    </button>

                    <label for="datePicker">Select another date:</label>
                    <input type="date" id="datePicker" class="date-picker">
                </div>

                <div class="table-container">
                    <table id="patientTable">
                        <thead>
                            <tr>
                                <th scope="col">Patient ID</th>
                                <th scope="col">Name</th>
                                <th scope="col">Phone</th>
                                <th scope="col">Email</th>
                                <th scope="col">Prescription</th>
                            </tr>
                        </thead>
                        <tbody id="patientTableBody"></tbody>
                    </table>
                </div>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <script type="module" src="../../static/js/components/patientRows.js"
            th:src="@{/js/components/patientRows.js}" defer></script>
    <script type="module" src="../../static/js/services/patientServices.js"
            th:src="@{/js/services/patientServices.js}" defer></script>
    <script type="module" src="../../static/js/doctorDashboard.js"
            th:src="@{/js/doctorDashboard.js}" defer></script>
</body>
</html>
