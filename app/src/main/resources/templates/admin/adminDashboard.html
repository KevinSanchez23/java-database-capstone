<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="icon" type="image/png" href="../../static/assets/images/logo/logo.png"
          th:href="@{/assets/images/logo/logo.png}">
    <link rel="stylesheet" href="../../static/assets/css/adminDashboard.css"
          th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" href="../../static/assets/css/style.css"
          th:href="@{/assets/css/style.css}">

    <script src="../../static/js/render.js" th:src="@{/js/render.js}" defer></script>
    <script src="../../static/js/util.js" th:src="@{/js/util.js}" defer></script>
    <script src="../../static/js/components/header.js" th:src="@{/js/components/header.js}" defer></script>
    <script src="../../static/js/components/footer.js" th:src="@{/js/components/footer.js}" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <input
                    type="text"
                    id="searchBar"
                    class="searchBar"
                    placeholder="Search by doctor name"
                    aria-label="Search by doctor name"
                    autocomplete="off"
                >

                <div class="filter-wrapper" aria-label="Doctor filters">
                    <select id="filterTime" class="filter-select" aria-label="Sort doctors by available time">
                        <option value="">Sort by Time</option>
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>

                    <select id="filterSpecialty" class="filter-select" aria-label="Filter doctors by specialty">
                        <option value="">Filter by Specialty</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="Orthopedic">Orthopedic</option>
                        <option value="Gynecologist">Gynecologist</option>
                        <option value="Psychiatrist">Psychiatrist</option>
                        <option value="Dentist">Dentist</option>
                        <option value="Ophthalmologist">Ophthalmologist</option>
                        <option value="Ent">ENT Specialist</option>
                        <option value="Urologist">Urologist</option>
                        <option value="Oncologist">Oncologist</option>
                        <option value="Gastroenterologist">Gastroenterologist</option>
                        <option value="General">General Physician</option>
                    </select>
                </div>

                <div id="content" aria-live="polite"></div>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Add doctor">
        <div class="modal-content">
            <span id="closeModal" class="close" role="button" tabindex="0" aria-label="Close modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="../../static/js/adminDashboard.js"
            th:src="@{/js/adminDashboard.js}" defer></script>
    <script type="module" src="../../static/js/components/doctorCard.js"
            th:src="@{/js/components/doctorCard.js}" defer></script>
</body>
</html>
